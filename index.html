<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Information Form</title>
    <style>
        body { font-family: "Times New Roman", serif; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 2px; }
        input[type="text"] { width: 250px; padding: 3px; }
        .button-container { margin-top: 20px; }
        button, input[type="reset"] { padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <form>
        <div class="form-group">
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="fname" value="Your first name">
        </div>

        <div class="form-group">
            <label for="lname">Last name:</label>
            <input type="text" id="lname" name="lname" value="Your last name">
        </div>

        <div class="form-group">
            <label for="sid">Student ID:</label>
            <input type="text" id="sid" name="sid" value="Your student ID">
        </div>

        <div class="button-container">
            <button type="submit">Submit</button>
            <input type="reset" value="重設">
        </div>
    </form>

</body>
</html>
